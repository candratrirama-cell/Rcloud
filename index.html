<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudpay Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F4F7FE; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-h-screen: 100vh;
            margin: 0;
        }
        .captcha-box {
            background: #fff;
            border: 2px dashed #007AFF;
            user-select: none;
            letter-spacing: 6px;
            font-weight: 800;
            font-style: italic;
            text-shadow: 2px 2px #f0f0f0;
        }
        .container-box {
            max-width: 320px;
            width: 100%;
            background: white;
            padding: 2rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="container-box">
        <div class="mb-6">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg animate-bounce">
                <svg width="30" height="30" fill="white" viewBox="0 0 24 24">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
                </svg>
            </div>
        </div>
        
        <h2 class="text-xl font-extrabold text-gray-900 mb-2 italic">Security Check</h2>
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-6">Menganalisa Koneksi Anda...</p>

        <div id="status-area">
            <div id="timer-box" class="py-4 bg-blue-50 text-blue-600 rounded-2xl font-bold text-sm border border-blue-100">
                Mohon Tunggu... (<span id="sec">3</span>s)
            </div>

            <div id="captcha-area" class="hidden space-y-4 animate-in fade-in duration-500">
                <div id="captcha-display" class="captcha-box py-3 text-2xl text-blue-600 rounded-xl"></div>
                <input type="text" id="captcha-input" maxlength="5" placeholder="Ketik Kode Diatas" 
                    class="w-full p-4 bg-gray-100 rounded-2xl outline-none text-center font-bold border-2 border-transparent focus:border-blue-500 transition-all">
                <button onclick="verify()" id="btn-verify" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold hover:bg-black active:scale-95 transition-all">
                    KONFIRMASI
                </button>
            </div>
        </div>
        
        <p class="mt-8 text-[9px] text-gray-300 font-bold uppercase tracking-[0.2em]">Protected by Cloudpay</p>
    </div>

    <script>
        let correctCaptcha = "";
        
        // Timer Delay 3 Detik Otomatis
        let time = 3;
        const countdown = setInterval(() => {
            time--;
            const secEl = document.getElementById('sec');
            if(secEl) secEl.innerText = time;
            
            if(time <= 0) {
                clearInterval(countdown);
                document.getElementById('timer-box').classList.add('hidden');
                document.getElementById('captcha-area').classList.remove('hidden');
                generateNewCaptcha();
            }
        }, 1000);

        // Fungsi Generate Captcha Acak
        function generateNewCaptcha() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            correctCaptcha = "";
            for (let i = 0; i < 5; i++) {
                correctCaptcha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('captcha-display').innerText = correctCaptcha;
        }

        // Fungsi Verifikasi & Pindah Halaman
        function verify() {
            const userInput = document.getElementById('captcha-input').value.trim().toUpperCase();
            const btn = document.getElementById('btn-verify');

            if(userInput === correctCaptcha) {
                btn.innerText = "Membuka Akses...";
                btn.disabled = true;
                
                // Simpan Kunci Sesi (Wajib ada agar dashboard.html bisa terbuka)
                sessionStorage.setItem('cloudpay_verified', 'active_session_777');
                
                // Redirect ke dashboard.html (Pastikan file dashboard.html ada di folder yang sama)
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 500);
            } else {
                alert("Kode Captcha Salah! Silahkan coba lagi.");
                generateNewCaptcha();
                document.getElementById('captcha-input').value = "";
                document.getElementById('captcha-input').focus();
            }
        }

        // Jalankan generate captcha jika user tekan Enter
        document.getElementById('captcha-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verify();
            }
        });
    </script>
</body>
</html>
