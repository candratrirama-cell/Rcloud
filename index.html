<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloudpay Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F4F7FE; -webkit-tap-highlight-color: transparent; }
        .liquid-nav { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 35px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); }
        .nav-active { color: #007AFF; transform: scale(1.1); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-active svg { filter: drop-shadow(0 0 8px rgba(0, 122, 255, 0.3)); }
        .btn-grad { background: linear-gradient(135deg, #007AFF 0%, #0056b3 100%); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        canvas { max-width: 100%; height: auto; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="overflow-x-hidden">

<div id="app" class="max-w-md mx-auto min-h-screen pb-36">
    
    <div id="splash-screen" class="flex items-center justify-center min-h-screen bg-white z-[100] fixed inset-0">
        <div class="text-center animate-pulse">
            <div class="bg-[#007AFF] w-20 h-20 rounded-[22px] flex items-center justify-center mb-4 mx-auto shadow-xl shadow-blue-100">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 4.02 2 6.5v11c0 2.48 4.48 4.5 10 4.5s10-2.02 10-4.5v-11C22 4.02 17.52 2 12 2z"/></svg>
            </div>
            <h2 class="text-xl font-black text-gray-800 tracking-tighter uppercase">CLOUDPAY</h2>
        </div>
    </div>

    <div id="login-section" class="hidden flex flex-col items-center justify-center min-h-screen p-6 fade-in">
        <div class="w-full bg-white/80 backdrop-blur-md p-8 rounded-[40px] shadow-2xl border border-white/50 flex flex-col items-center text-center">
            <h1 class="text-2xl font-extrabold text-gray-900 mb-2 italic tracking-tight">MASUK CLOUDPAY</h1>
            <div class="w-full space-y-4 mt-6">
                <input id="login_wa" type="number" placeholder="WhatsApp" class="w-full p-4 bg-gray-100/50 rounded-2xl outline-none font-semibold border-2 border-transparent focus:border-blue-500">
                <input id="login_pw" type="password" placeholder="Password" class="w-full p-4 bg-gray-100/50 rounded-2xl outline-none font-semibold border-2 border-transparent focus:border-blue-500">
                <button onclick="processLogin()" class="btn-grad w-full py-4 rounded-2xl text-white font-bold text-lg">LOGIN</button>
            </div>
            <p class="mt-8 text-sm text-gray-500">Baru? <span onclick="showAuthPage('register')" class="text-blue-600 font-bold cursor-pointer underline">Daftar</span></p>
        </div>
    </div>

    <div id="register-section" class="hidden flex flex-col items-center justify-center min-h-screen p-6 fade-in">
        <div class="w-full bg-white/80 backdrop-blur-md p-8 rounded-[40px] shadow-2xl border border-white/50 flex flex-col items-center text-center">
            <h1 class="text-2xl font-extrabold text-gray-900 mb-2 italic tracking-tight">DAFTAR BARU</h1>
            <div class="w-full space-y-4 mt-6">
                <input id="reg_wa" type="number" placeholder="WhatsApp" class="w-full p-4 bg-gray-100/50 rounded-2xl outline-none font-semibold border-2 border-transparent focus:border-blue-500">
                <input id="reg_name" type="text" placeholder="Username" class="w-full p-4 bg-gray-100/50 rounded-2xl outline-none font-semibold border-2 border-transparent focus:border-blue-500">
                <input id="reg_pw" type="password" placeholder="Password" class="w-full p-4 bg-gray-100/50 rounded-2xl outline-none font-semibold border-2 border-transparent focus:border-blue-500">
                <button onclick="processRegister()" class="btn-grad w-full py-4 rounded-2xl text-white font-bold text-lg">DAFTAR</button>
            </div>
            <p class="mt-8 text-sm text-gray-500">Sudah ada akun? <span onclick="showAuthPage('login')" class="text-blue-600 font-bold cursor-pointer underline">Login</span></p>
        </div>
    </div>

    <div id="main-section" class="hidden fade-in">
        <div id="page-home" class="p-6 space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="font-extrabold text-xl italic tracking-tighter">CLOUDPAY.</h2>
                <span id="display-user" class="text-[10px] font-bold bg-white text-blue-600 px-4 py-1.5 rounded-full border border-blue-50 uppercase">...</span>
            </div>
            <div class="bg-gray-900 p-8 rounded-[45px] text-white shadow-2xl relative overflow-hidden">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1 tracking-widest">Saldo Tersedia</p>
                <h3 class="text-4xl font-extrabold tracking-tight">Rp <span id="display-balance">0</span></h3>
                <div class="mt-10 flex gap-3">
                    <button onclick="switchTab('qris')" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold text-sm">Top Up</button>
                    <button onclick="switchTab('wd')" class="flex-1 bg-white/10 py-4 rounded-2xl font-bold text-sm backdrop-blur-md">Tarik Dana</button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-[35px] border border-gray-50 text-center"><p class="text-[9px] font-bold text-gray-400 uppercase">Pemasukan</p><p class="text-lg font-extrabold text-green-500">Rp <span id="stat-in">0</span></p></div>
                <div class="bg-white p-6 rounded-[35px] border border-gray-50 text-center"><p class="text-[9px] font-bold text-gray-400 uppercase">Pengeluaran</p><p class="text-lg font-extrabold text-red-500">Rp <span id="stat-out">0</span></p></div>
            </div>
        </div>

        <div id="page-history" class="hidden p-6 fade-in min-h-screen">
            <h2 class="text-2xl font-extrabold mb-6 italic">RIWAYAT</h2>
            <div id="history-list" class="space-y-4 pb-24"></div>
        </div>

        <div id="page-qris" class="hidden p-6 fade-in text-center min-h-screen">
            <div id="qris-form" class="text-left space-y-4">
                <h2 class="text-2xl font-extrabold italic">TOP UP SALDO</h2>
                <div class="bg-white p-7 rounded-[40px] shadow-sm"><p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Nominal Deposit</p>
                <input id="topup-amt" type="number" value="1000" class="w-full text-3xl font-extrabold outline-none text-blue-600 bg-transparent"></div>
                <button onclick="generateQR()" id="btn-gen" class="btn-grad w-full py-5 rounded-[28px] text-white font-bold text-lg shadow-xl">GENERATE QRIS</button>
            </div>
            <div id="qr-display" class="hidden fade-in">
                <canvas id="qris-canvas" width="400" height="550" class="mx-auto mb-6"></canvas>
                <p id="qr-status" class="text-blue-600 font-bold animate-pulse text-xs uppercase tracking-[0.2em]">Menunggu Pembayaran...</p>
                <button onclick="cancelQR()" class="mt-4 w-full py-4 rounded-3xl bg-red-50 text-red-500 font-bold text-xs tracking-widest">CANCEL</button>
            </div>
        </div>

        <div id="page-wd" class="hidden p-6 fade-in min-h-screen">
            <h2 class="text-2xl font-extrabold mb-6 italic text-red-600">WITHDRAW</h2>
            <div class="space-y-4">
                <div class="bg-white p-7 rounded-[40px] shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Metode</p>
                    <select id="wd-wallet" class="w-full text-xl font-bold outline-none bg-transparent">
                        <option value="DANA">DANA</option><option value="GOPAY">GOPAY</option>
                    </select>
                </div>
                <div class="bg-white p-7 rounded-[40px] shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Nominal WD</p>
                    <input id="wd-amt" type="number" placeholder="Min. 10,000" class="w-full text-3xl font-extrabold outline-none text-red-600 bg-transparent">
                </div>
            </div>
            <button onclick="handleWD()" class="w-full py-5 rounded-[28px] bg-gray-900 text-white font-bold text-lg shadow-2xl mt-6">PROSES WD</button>
        </div>
    </div>

    <div id="nav-bar" class="fixed bottom-6 left-6 right-6 h-20 liquid-nav z-50 hidden flex items-center justify-around">
        <button onclick="switchTab('home')" id="nav-home" class="nav-active flex flex-col items-center"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg><span class="text-[8px] font-bold">HOME</span></button>
        <button onclick="switchTab('qris')" id="nav-qris" class="text-gray-400 flex flex-col items-center"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg><span class="text-[8px] font-bold">TOPUP</span></button>
        <button onclick="switchTab('history')" id="nav-history" class="text-gray-400 flex flex-col items-center"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span class="text-[8px] font-bold">HISTORY</span></button>
        <button onclick="processLogout()" class="text-red-400 flex flex-col items-center opacity-60"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 16l4-4m0 0l-4-4m4 4H7"/></svg><span class="text-[8px] font-bold">EXIT</span></button>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD1OHn2utYY881b504XEgMAwmhrglqtinQ",
        authDomain: "sedabase.firebaseapp.com",
        databaseURL: "https://sedabase-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sedabase",
        storageBucket: "sedabase.firebasestorage.app",
        messagingSenderId: "921144451877",
        appId: "1:921144451877:web:f37ec5e4de4ff4fc4870cc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUserWA = null, currentUserName = null, paymentChecker = null, isProcessing = false;

    async function callBackend(path, method = 'GET', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(path, options);
        return await res.json();
    }

    window.onload = () => {
        const saved = localStorage.getItem('cloudpay_session');
        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('hidden');
            if (saved) { const d = JSON.parse(saved); initDashboard(d.wa, d.username); } 
            else { showAuthPage('login'); }
        }, 1500);
    };

    function initDashboard(wa, uname) {
        currentUserWA = wa; currentUserName = uname;
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('register-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        document.getElementById('nav-bar').classList.remove('hidden');
        document.getElementById('display-user').innerText = uname;

        onValue(ref(db, `users/${wa}`), (snap) => {
            const d = snap.val() || {};
            document.getElementById('display-balance').innerText = (d.balance || 0).toLocaleString('id-ID');
            document.getElementById('stat-in').innerText = (d.total_in || 0).toLocaleString('id-ID');
            document.getElementById('stat-out').innerText = (d.total_out || 0).toLocaleString('id-ID');
        });

        onValue(ref(db, `users/${wa}/riwayat`), (snap) => {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            if(snap.exists()) {
                Object.values(snap.val()).reverse().forEach(t => {
                    const isIn = t.type.includes('TOPUP');
                    list.innerHTML += `<div class="bg-white/70 p-6 rounded-[35px] flex justify-between items-center border border-white shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="w-11 h-11 ${isIn ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'} rounded-[18px] flex items-center justify-center font-bold">${isIn ? '↓' : '↑'}</div>
                            <div><p class="text-[10px] font-black uppercase">${t.type}</p><p class="text-[8px] text-gray-400 font-bold">${new Date(t.time).toLocaleString()}</p></div>
                        </div>
                        <p class="font-black text-sm ${isIn ? 'text-green-600' : 'text-red-600'}">${isIn ? '+' : '-'} ${t.amt.toLocaleString()}</p>
                    </div>`;
                });
            }
        });
    }

    window.generateQR = async () => {
        const amt = document.getElementById('topup-amt').value;
        if(amt < 100) return alert("Min. 100");
        const btn = document.getElementById('btn-gen');
        btn.disabled = true; btn.innerText = "Connecting...";

        try {
            const data = await callBackend(`/api/generate-qris?amt=${amt}`);
            if(data.success && data.trxId) {
                document.getElementById('qris-form').classList.add('hidden');
                document.getElementById('qr-display').classList.remove('hidden');
                drawQRIS(data.qr, amt);

                if(paymentChecker) clearInterval(paymentChecker);
                isProcessing = false; // Reset flag untuk transaksi baru

                paymentChecker = setInterval(async () => {
                    if (isProcessing) return; // Cegah double proses jika sudah ada yang jalan

                    const cd = await callBackend(`/api/check-qris?trxId=${data.trxId}`);
                    
                    if((cd.paid || cd.status === "Success") && cd.isFirstValid) {
                        isProcessing = true; // Kunci proses update saldo
                        clearInterval(paymentChecker);

                        const userRef = ref(db, `users/${currentUserWA}`);
                        const s = await get(userRef);
                        const cur = s.val();
                        
                        const newBal = Number(cur.balance) + Number(amt);
                        await update(userRef, { balance: newBal, total_in: (cur.total_in || 0) + Number(amt) });
                        push(ref(db, `users/${currentUserWA}/riwayat`), { type: 'TOPUP QRIS', amt: parseInt(amt), time: Date.now() });
                        
                        await callBackend('/api/tele-notif', 'POST', { 
                            message: `✅ *Top Up Sukses*\n\n👤 User: ${currentUserName}\n💰 Nominal: Rp ${parseInt(amt).toLocaleString()}\n🆔 Trx: ${data.trxId}` 
                        });

                        alert("✅ TOPUP SUCCESS!"); 
                        cancelQR(); switchTab('home');
                    }
                }, 5000);
            }
        } catch(e) { alert("Error"); btn.disabled = false; btn.innerText = "GENERATE QRIS"; }
    };

    window.handleWD = async () => {
        const amt = parseInt(document.getElementById('wd-amt').value);
        const wallet = document.getElementById('wd-wallet').value;
        if(amt < 10000) return alert("Minimum WD 10k");
        const userRef = ref(db, `users/${currentUserWA}`);
        const s = await get(userRef);
        const d = s.val();
        if(d.balance < amt) return alert("Saldo Kurang!");

        if(confirm(`Tarik Rp ${amt.toLocaleString()} ke ${wallet}?`)){
            await update(userRef, { balance: d.balance - amt, total_out: (d.total_out || 0) + amt });
            push(ref(db, `users/${currentUserWA}/riwayat`), { type: `WD ${wallet}`, amt: amt, time: Date.now() });
            await callBackend('/api/tele-notif', 'POST', { message: `⚠️ *Request WD*\n\n👤 User: ${currentUserName}\n💸 Nominal: Rp ${amt.toLocaleString()}\n💳 ${wallet}: ${currentUserWA}` });
            alert("WD Dikirim!"); switchTab('home');
        }
    };

    function drawQRIS(qrString, amount) {
        const canvas = document.getElementById('qris-canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fdfdfd'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#1a1a1a'; ctx.font = 'bold 24px Plus Jakarta Sans'; ctx.textAlign = 'center'; ctx.fillText('PAYMENT QRIS', 200, 85);
        const qrImg = new Image(); qrImg.crossOrigin = "anonymous";
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(qrString)}`;
        qrImg.onload = () => {
            ctx.drawImage(qrImg, 75, 165, 250, 250);
            ctx.fillStyle = '#007AFF'; ctx.font = '800 28px Plus Jakarta Sans'; ctx.fillText(`Rp ${parseInt(amount).toLocaleString('id-ID')}`, 200, 495);
        };
    }

    window.showAuthPage = (t) => { ['login', 'register'].forEach(x => document.getElementById(x + '-section').classList.add('hidden')); document.getElementById(t + '-section').classList.remove('hidden'); };
    window.processLogin = async () => {
        const wa = document.getElementById('login_wa').value.trim();
        const pw = document.getElementById('login_pw').value;
        const snap = await get(ref(db, 'users/' + wa));
        if (snap.exists() && snap.val().password === pw) {
            localStorage.setItem('cloudpay_session', JSON.stringify({ wa: wa, username: snap.val().username }));
            initDashboard(wa, snap.val().username);
        } else alert("Gagal Login!");
    };
    window.processRegister = async () => {
        const wa = document.getElementById('reg_wa').value.trim();
        const name = document.getElementById('reg_name').value.trim();
        const pw = document.getElementById('reg_pw').value;
        const snap = await get(ref(db, 'users/' + wa));
        if (snap.exists()) alert("Nomor sudah ada!");
        else {
            await set(ref(db, 'users/' + wa), { username: name, password: pw, wa: wa, balance: 0, total_in: 0, total_out: 0 });
            localStorage.setItem('cloudpay_session', JSON.stringify({ wa: wa, username: name }));
            initDashboard(wa, name);
        }
    };
    window.processLogout = () => { if(confirm("Logout?")) { localStorage.removeItem('cloudpay_session'); location.reload(); } };
    window.switchTab = (tab) => {
        ['home', 'qris', 'history', 'wd'].forEach(p => { if(document.getElementById('page-' + p)) document.getElementById('page-' + p).classList.add('hidden'); });
        document.getElementById('page-' + tab).classList.remove('hidden');
    };
    window.cancelQR = () => { clearInterval(paymentChecker); document.getElementById('qris-form').classList.remove('hidden'); document.getElementById('qr-display').classList.add('hidden'); document.getElementById('btn-gen').disabled = false; document.getElementById('btn-gen').innerText = "GENERATE QRIS"; };
</script>
</body>
</html>
