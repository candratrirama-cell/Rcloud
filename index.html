<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-sm mb-4 border border-gray-100">
            <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">Saldo CloudPay</p>
            <h1 id="view_saldo" class="text-3xl font-black text-blue-600">Rp 0</h1>
        </div>

        <div id="qr_display" class="hidden bg-white p-4 rounded-2xl shadow-sm mb-4 text-center border-2 border-dashed border-blue-200">
            <p class="text-sm font-bold text-blue-500 mb-2">Scan & Bayar</p>
            <img id="qr_img" src="" class="mx-auto w-44">
        </div>

        <div class="space-y-3">
            <button onclick="window.Android.action('topup')" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg">Top Up Saldo</button>
            <button onclick="window.Android.action('withdraw')" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl shadow-lg">Tarik Dana</button>
        </div>
    </div>

    <script>
        // Fungsi panggil dari Sketchware untuk update UI
        function updateUI(saldo, qrData) {
            document.getElementById('view_saldo').innerText = "Rp " + saldo;
            if (qrData) {
                document.getElementById('qr_display').classList.remove('hidden');
                document.getElementById('qr_img').src = "https://api.qrserver.com/v1/create-qr-code/?data=" + qrData;
            } else {
                document.getElementById('qr_display').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
