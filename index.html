<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudpay v1.2.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-slate-950 text-white font-sans selection:bg-blue-500">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-card p-8 w-full max-w-sm animate__animated animate__zoomIn">
            <h1 class="text-3xl font-black text-center mb-2 italic text-blue-500">CLOUDPAY</h1>
            <p class="text-center text-gray-400 text-sm mb-8">Silahkan masuk atau daftar</p>
            <div class="space-y-4">
                <input id="reg-user" type="text" placeholder="Username unik" class="input-field">
                <input id="reg-wa" type="number" placeholder="Nomor WhatsApp" class="input-field">
                <input id="reg-pass" type="password" placeholder="Password" class="input-field">
                <button onclick="handleAuth()" class="btn-primary w-full py-3 mt-4">MASUK / DAFTAR</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen pb-28">
        <header class="p-6 sticky top-0 bg-slate-950/80 backdrop-blur-xl z-40">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-gray-400 text-sm">Halo, <span id="display-user" class="text-blue-400 font-bold">User</span></p>
                    <h2 id="user-balance" class="text-3xl font-black tracking-tight">Rp 0</h2>
                </div>
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-bold">CP</div>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="glass-card p-3 border-l-4 border-green-500">
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest">Masuk (Hari ini)</p>
                    <p id="stat-in" class="font-bold text-green-400">Rp 0</p>
                </div>
                <div class="glass-card p-3 border-l-4 border-red-500">
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest">Keluar (Hari ini)</p>
                    <p id="stat-out" class="font-bold text-red-400">Rp 0</p>
                </div>
            </div>
        </header>

        <main id="content-area" class="px-6 space-y-4 animate__animated animate__fadeInUp"></main>

        <nav class="fixed bottom-6 left-6 right-6 z-50">
            <div class="glass-card flex justify-around items-center py-4 px-2 border-slate-700/50">
                <button onclick="router('home')" class="nav-btn">🏠</button>
                <button onclick="router('withdraw')" class="nav-btn">💸</button>
                <button onclick="router('qris')" class="nav-btn">📸</button>
                <button onclick="router('history')" class="nav-btn">📜</button>
                <button onclick="router('about')" class="nav-btn">ℹ️</button>
            </div>
        </nav>
    </div>

    <div id="qris-modal" class="fixed inset-0 bg-black/95 hidden z-[100] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white text-black p-6 rounded-[2.5rem] w-full max-w-xs text-center relative overflow-hidden shadow-2xl animate__animated animate__bounceIn">
            <div class="batik-overlay absolute inset-0 opacity-10"></div>
            <div class="relative z-10">
                <h3 class="font-black italic text-xl mb-1">CLOUDPAY <span class="text-blue-600 italic">X</span> LHOKTO</h3>
                <div id="qr-display" class="bg-white p-4 inline-block rounded-3xl mb-4 border-4 border-slate-100 mt-2"></div>
                <p class="text-[10px] text-red-600 font-black tracking-tighter mb-4 animate-pulse uppercase">QRIS HANYA BERLAKU 15 MENIT</p>
                <button onclick="closeQRIS()" class="w-full bg-slate-100 py-3 rounded-2xl font-bold text-slate-500">BATALKAN</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script src="api.js"></script>
</body>
</html>
