<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cloudpay Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-black text-white p-5">
    <div id="app" class="max-w-md mx-auto bg-gray-900 p-6 rounded-xl border border-blue-600">
        <h1 class="text-2xl font-bold text-blue-500 mb-4 text-center">CLOUDPAY</h1>
        
        <div class="mb-6 bg-gray-800 p-4 rounded-lg">
            <p>User: <span id="display-user">-</span></p>
            <p class="text-xl">Saldo: <span class="text-green-400">Rp <span id="display-balance">0</span></span></p>
        </div>

        <input type="number" id="amount" placeholder="Jumlah Topup (Min 100)" class="w-full p-2 mb-2 bg-gray-800 rounded">
        <button onclick="topup()" class="w-full bg-blue-600 p-2 rounded font-bold">Top Up Sekarang</button>

        <div id="qris-box" class="hidden mt-5 text-center">
            <img id="qr-img" class="mx-auto rounded bg-white p-2 w-48">
            <p class="mt-2 text-yellow-400 animate-pulse text-sm">Menunggu Pembayaran...</p>
        </div>
    </div>

    <script>
        let username = prompt("Masukkan Username Anda:");
        document.getElementById('display-user').innerText = username;

        async function topup() {
            const amt = document.getElementById('amount').value;
            if(amt < 100) return alert("Minimal 100");

            const res = await fetch(`/api/deposit?user=${username}&amt=${amt}`);
            const data = await res.json();

            if(data.success) {
                document.getElementById('qris-box').classList.remove('hidden');
                document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?data=${data.qr}`;
                
                // Mulai auto check
                startChecking(data.trxId, amt);
            }
        }

        function startChecking(trxId, amt) {
            const timer = setInterval(async () => {
                const res = await fetch(`/api/check-payment?trxId=${trxId}&user=${username}&amt=${amt}`);
                const data = await res.json();
                
                if(data.paid) {
                    clearInterval(timer);
                    document.getElementById('qris-box').classList.add('hidden');
                    Swal.fire("Berhasil", "Saldo otomatis masuk!", "success");
                    // Refresh saldo di sini bisa menggunakan logic Firebase atau reload
                }
            }, 5000);
        }
    </script>
</body>
</html>
