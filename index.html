<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudpay - Top Up & Withdraw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loader { border-top-color: #2563eb; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
        .tab-active { color: #2563eb; }
        .tab-inactive { color: #94a3b8; }
        .hide { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center">
        <div class="loader w-10 h-10 border-4 border-slate-200 rounded-full mb-4"></div>
        <p class="text-slate-500 font-medium animate-pulse">Menghubungkan ke Cloudpay...</p>
    </div>

    <!-- Auth Container -->
    <div id="auth-container" class="min-h-screen flex items-center justify-center p-6 bg-white hide">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <i class="fas fa-wallet text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">Cloudpay</h1>
                <p id="auth-subtitle" class="text-slate-400 text-sm">Masuk untuk mengelola saldo Anda</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-phone absolute left-4 top-4 text-slate-300"></i>
                    <input type="tel" id="login-phone" placeholder="Nomor WhatsApp" required class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-4 text-slate-300"></i>
                    <input type="password" id="login-pass" placeholder="Password" required class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" id="btn-login-submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-[0.98] transition-all">Masuk Sekarang</button>
                <p class="text-center text-sm text-slate-500 mt-4">Belum punya akun? <button type="button" onclick="toggleAuth('register')" class="text-blue-600 font-bold">Daftar</button></p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="space-y-4 hide">
                <input type="text" id="reg-name" placeholder="Nama Lengkap" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="tel" id="reg-phone" placeholder="Nomor WhatsApp (628...)" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="reg-pass" placeholder="Buat Password" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" id="btn-reg-submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">Buat Akun Baru</button>
                <p class="text-center text-sm text-slate-500 mt-4">Sudah punya akun? <button type="button" onclick="toggleAuth('login')" class="text-blue-600 font-bold">Login</button></p>
            </form>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="app-container" class="min-h-screen pb-24 hide">
        <header class="bg-white border-b border-slate-100 p-4 sticky top-0 z-50 glass">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-blue-600">Cloudpay</h2>
                    <p id="user-display" class="text-[10px] text-slate-400 font-medium">Memuat profil...</p>
                </div>
                <button onclick="logout()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-red-500">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4 space-y-6">
            <section id="view-home" class="view">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-6 text-white shadow-xl mb-6">
                    <p class="text-blue-100 text-xs font-medium uppercase tracking-wider mb-1">Total Saldo</p>
                    <h2 id="balance-display" class="text-3xl font-bold mb-6">Rp 0</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="switchView('topup')" class="bg-white/20 hover:bg-white/30 p-3 rounded-xl flex items-center justify-center gap-2 backdrop-blur-sm transition-colors">
                            <i class="fas fa-circle-plus"></i> <span class="font-bold text-sm">Top Up</span>
                        </button>
                        <button onclick="switchView('withdraw')" class="bg-white/20 hover:bg-white/30 p-3 rounded-xl flex items-center justify-center gap-2 backdrop-blur-sm transition-colors">
                            <i class="fas fa-circle-minus"></i> <span class="font-bold text-sm">Tarik Dana</span>
                        </button>
                    </div>
                </div>
                <!-- ... Info Box ... -->
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-4">
                    <h3 class="font-bold flex items-center gap-2 text-slate-800"><i class="fas fa-info-circle text-blue-500"></i> Informasi</h3>
                    <div class="space-y-2 text-sm text-slate-500">
                        <div class="flex justify-between"><span>Minimal Top Up</span><span class="font-bold text-slate-700">Rp 100</span></div>
                        <div class="flex justify-between"><span>Minimal Withdraw</span><span class="font-bold text-slate-700">Rp 10.000</span></div>
                    </div>
                </div>
            </section>

            <!-- TopUp View -->
            <section id="view-topup" class="view hide">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-xl font-bold mb-4">Isi Saldo</h2>
                    <div id="topup-initial">
                        <input type="number" id="topup-amount" placeholder="Nominal (Min. 100)" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xl font-bold outline-none mb-4">
                        <button onclick="generateQRIS()" id="btn-generate" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">Lanjut Bayar</button>
                    </div>
                    <div id="topup-qr" class="hide text-center space-y-4">
                        <img id="qr-img" src="" class="mx-auto w-[220px] bg-white p-2 border rounded-xl">
                        <div class="bg-blue-50 p-3 rounded-xl">
                            <p id="qr-total" class="text-xl font-bold text-blue-700">Rp 0</p>
                        </div>
                        <button onclick="cancelTopUp()" class="text-slate-400 text-xs font-bold">Batalkan</button>
                    </div>
                </div>
            </section>

            <!-- Withdraw View -->
            <section id="view-withdraw" class="view hide">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-xl font-bold mb-4">Penarikan Dana</h2>
                    <form id="wd-form" class="space-y-4">
                        <select id="wd-bank" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none">
                            <option value="">Pilih Bank / E-Wallet</option>
                            <option>DANA</option><option>GOPAY</option><option>OVO</option>
                        </select>
                        <input type="text" id="wd-acc" placeholder="No. Rekening / No. HP" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none">
                        <input type="number" id="wd-amount" placeholder="Nominal" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none">
                        <button type="submit" id="btn-wd-submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg">Ajukan Penarikan</button>
                    </form>
                </div>
            </section>

            <section id="view-history" class="view hide space-y-3">
                <h2 class="text-xl font-bold mb-4 px-2">Riwayat Transaksi</h2>
                <div id="history-list" class="space-y-3"></div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-3 max-w-md mx-auto z-[60]">
            <button onclick="switchView('home')" class="nav-btn tab-active" data-view="home"><i class="fas fa-wallet"></i></button>
            <button onclick="switchView('topup')" class="nav-btn tab-inactive" data-view="topup"><i class="fas fa-plus-circle"></i></button>
            <button onclick="switchView('withdraw')" class="nav-btn tab-inactive" data-view="withdraw"><i class="fas fa-minus-circle"></i></button>
            <button onclick="switchView('history')" class="nav-btn tab-inactive" data-view="history"><i class="fas fa-history"></i></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1OHn2utYY881b504XEgMAwmhrglqtinQ",
            authDomain: "sedabase.firebaseapp.com",
            projectId: "sedabase",
            storageBucket: "sedabase.firebasestorage.app",
            messagingSenderId: "921144451877",
            appId: "1:921144451877:web:f37ec5e4de4ff4fc4870cc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "cloudpay_v2";
        const API_KEY = "rapay_jur337mgb";
        const BASE_URL = "https://bior-beta.vercel.app/api/pay";

        let currentProfile = null;
        let checkInterval = null;

        const show = (id) => document.getElementById(id)?.classList.remove('hide');
        const hide = (id) => document.getElementById(id)?.classList.add('hide');
        const formatIDR = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

        // Global Auth Logic
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const session = localStorage.getItem('cp_session');
                if (session) {
                    initAppData(session);
                } else {
                    hide('loading-screen');
                    show('auth-container');
                }
            } else {
                try {
                    await signInAnonymously(auth);
                } catch (e) {
                    console.error("Auth failed", e);
                    hide('loading-screen');
                    show('auth-container');
                }
            }
        });

        async function initAppData(phone) {
            const docRef = doc(db, 'artifacts', APP_ID, 'users', phone, 'profile', 'data');
            try {
                const snap = await getDoc(docRef);
                if (!snap.exists()) {
                    logout();
                    return;
                }

                onSnapshot(docRef, (s) => {
                    if (s.exists()) {
                        currentProfile = s.data();
                        document.getElementById('user-display').innerText = `Halo, ${currentProfile.name}`;
                        document.getElementById('balance-display').innerText = formatIDR(currentProfile.balance || 0);
                        hide('loading-screen');
                        hide('auth-container');
                        show('app-container');
                    }
                });

                const txRef = collection(db, 'artifacts', APP_ID, 'users', phone, 'transactions');
                onSnapshot(txRef, (snap) => {
                    const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    list.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    renderHistory(list);
                });
            } catch (e) {
                console.error("Data error", e);
                logout();
            }
        }

        // Auth Actions
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-login-submit');
            
            btn.disabled = true;
            btn.innerText = "Memproses...";
            
            try {
                const docRef = doc(db, 'artifacts', APP_ID, 'users', phone, 'profile', 'data');
                const snap = await getDoc(docRef);
                if (snap.exists() && snap.data().password === pass) {
                    localStorage.setItem('cp_session', phone);
                    initAppData(phone);
                } else {
                    alert("Nomor WA atau Password salah!");
                }
            } catch (err) { alert("Koneksi gagal"); }
            finally { btn.disabled = false; btn.innerText = "Masuk Sekarang"; }
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;
            const btn = document.getElementById('btn-reg-submit');

            btn.disabled = true;
            btn.innerText = "Memproses...";

            try {
                const docRef = doc(db, 'artifacts', APP_ID, 'users', phone, 'profile', 'data');
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    alert("Nomor sudah terdaftar!");
                } else {
                    await setDoc(docRef, { name, phone, password: pass, balance: 0, createdAt: serverTimestamp() });
                    localStorage.setItem('cp_session', phone);
                    initAppData(phone);
                }
            } catch (err) { alert("Gagal mendaftar"); }
            finally { btn.disabled = false; btn.innerText = "Buat Akun Baru"; }
        };

        window.toggleAuth = (mode) => {
            if (mode === 'register') { hide('login-form'); show('register-form'); }
            else { show('login-form'); hide('register-form'); }
        };

        window.logout = () => {
            localStorage.removeItem('cp_session');
            location.reload();
        };

        window.switchView = (target) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hide'));
            show('view-' + target);
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.replace(b.dataset.view === target ? 'tab-inactive' : 'tab-active', b.dataset.view === target ? 'tab-active' : 'tab-inactive');
            });
        };

        // Payment Logic
        window.generateQRIS = async () => {
            const amount = parseInt(document.getElementById('topup-amount').value);
            if (amount < 100) return alert("Min. 100");
            const btn = document.getElementById('btn-generate');
            btn.disabled = true;
            btn.innerText = "Sedang Membuat QRIS...";

            try {
                const res = await fetch(`${BASE_URL}?key=${API_KEY}&amt=${amount}`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(data.qr)}`;
                    document.getElementById('qr-total').innerText = formatIDR(amount);
                    hide('topup-initial'); show('topup-qr');
                    startCheckPayment(data.trxId, amount);
                }
            } catch (e) { alert("API Offline"); }
            finally { btn.disabled = false; btn.innerText = "Lanjut Bayar"; }
        };

        function startCheckPayment(trxId, amt) {
            if (checkInterval) clearInterval(checkInterval);
            checkInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${BASE_URL}?action=check&trxId=${trxId}`);
                    const data = await res.json();
                    if (data.success && data.paid) {
                        clearInterval(checkInterval);
                        const phone = localStorage.getItem('cp_session');
                        const docRef = doc(db, 'artifacts', APP_ID, 'users', phone, 'profile', 'data');
                        await updateDoc(docRef, { balance: (currentProfile.balance || 0) + amt });
                        await addDoc(collection(db, 'artifacts', APP_ID, 'users', phone, 'transactions'), {
                            type: 'topup', amount: amt, status: 'success', createdAt: serverTimestamp()
                        });
                        alert("Top Up Berhasil!");
                        cancelTopUp(); switchView('home');
                    }
                } catch (e) {}
            }, 6000);
        }

        window.cancelTopUp = () => { clearInterval(checkInterval); hide('topup-qr'); show('topup-initial'); };

        document.getElementById('wd-form').onsubmit = async (e) => {
            e.preventDefault();
            const amt = parseInt(document.getElementById('wd-amount').value);
            if (amt < 10000 || amt > currentProfile.balance) return alert("Saldo tidak cukup atau kurang dari 10rb");
            const phone = localStorage.getItem('cp_session');
            await updateDoc(doc(db, 'artifacts', APP_ID, 'users', phone, 'profile', 'data'), { balance: currentProfile.balance - amt });
            await addDoc(collection(db, 'artifacts', APP_ID, 'users', phone, 'transactions'), {
                type: 'withdraw', amount: amt, status: 'pending', createdAt: serverTimestamp()
            });
            alert("Berhasil diajukan!"); switchView('home');
        };

        function renderHistory(data) {
            const container = document.getElementById('history-list');
            container.innerHTML = data.map(tx => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50">
                    <div>
                        <p class="text-xs font-bold">${tx.type === 'topup' ? 'Top Up' : 'Withdraw'}</p>
                        <p class="text-[9px] text-slate-400">${tx.createdAt ? new Date(tx.createdAt.seconds * 1000).toLocaleString() : '...'}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold ${tx.type === 'topup' ? 'text-green-600' : 'text-red-600'}">${formatIDR(tx.amount)}</p>
                        <p class="text-[8px] uppercase font-bold">${tx.status}</p>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-slate-400 py-10">Kosong</p>';
        }
    </script>
</body>
</html>
