<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudpay Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F4F7FE; }
        .captcha-box {
            background: #fff;
            border: 2px dashed #007AFF;
            user-select: none;
            letter-spacing: 6px;
            font-weight: 800;
            font-style: italic;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-xs w-full text-center bg-white p-8 rounded-[40px] shadow-2xl border border-white">
        <div class="mb-6">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg animate-bounce">
                <svg width="30" height="30" fill="white" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
            </div>
        </div>
        
        <h2 class="text-xl font-extrabold text-gray-900 mb-2">Security Check</h2>
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-6">MENGANALISA KONEKSI ANDA</p>

        <div id="status-area">
            <div id="timer-box" class="py-4 bg-blue-50 text-blue-600 rounded-2xl font-bold text-sm">
                Menunggu... (<span id="sec">3</span>s)
            </div>

            <div id="captcha-area" class="hidden space-y-4">
                <div id="captcha-display" class="captcha-box py-3 text-2xl text-blue-600"></div>
                <input type="text" id="captcha-input" placeholder="Masukkan Kode" class="w-full p-4 bg-gray-100 rounded-2xl outline-none text-center font-bold border-2 border-transparent focus:border-blue-500">
                <button onclick="verify()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold hover:bg-black transition-all">MASUK CLOUDPAY</button>
            </div>
        </div>
    </div>

    <script>
        let correctCaptcha = "";
        
        // 1. Delay 3 Detik
        let time = 3;
        const count = setInterval(() => {
            time--;
            document.getElementById('sec').innerText = time;
            if(time <= 0) {
                clearInterval(count);
                document.getElementById('timer-box').classList.add('hidden');
                document.getElementById('captcha-area').classList.remove('hidden');
                gen();
            }
        }, 1000);

        function gen() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            correctCaptcha = "";
            for (let i = 0; i < 5; i++) correctCaptcha += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('captcha-display').innerText = correctCaptcha;
        }

        function verify() {
            const input = document.getElementById('captcha-input').value.toUpperCase();
            if(input === correctCaptcha) {
                // Berikan Token Sesi (Valid sampai tab ditutup)
                sessionStorage.setItem('access_granted', 'true');
                window.location.href = "dashboard.html";
            } else {
                alert("Captcha Salah!");
                gen();
            }
        }
    </script>
</body>
</html>
