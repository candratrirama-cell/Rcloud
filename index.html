<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloudpay Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F4F7FE; -webkit-tap-highlight-color: transparent; }
        .liquid-nav { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 35px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); }
        .nav-active { color: #007AFF; transform: scale(1.1); transition: 0.3s; }
        .btn-grad { background: linear-gradient(135deg, #007AFF 0%, #0056b3 100%); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        canvas { max-width: 100%; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="overflow-x-hidden">

<div id="app" class="max-w-md mx-auto min-h-screen">
    
    <div id="page-auth" class="p-6 fade-in min-h-screen flex flex-col justify-center bg-white">
        <div class="text-center mb-10">
            <div class="bg-[#007AFF] w-16 h-16 rounded-[20px] flex items-center justify-center mb-4 mx-auto shadow-xl">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            </div>
            <h2 class="text-2xl font-black italic tracking-tighter uppercase">Cloudpay Auth</h2>
        </div>

        <div class="space-y-4">
            <div id="reg-fields" class="hidden space-y-4">
                <div class="bg-gray-50 p-5 rounded-[25px] border border-gray-100">
                    <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Username</p>
                    <input id="auth-name" type="text" placeholder="Nama Lengkap" class="w-full font-bold outline-none bg-transparent">
                </div>
            </div>
            <div class="bg-gray-50 p-5 rounded-[25px] border border-gray-100">
                <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">WhatsApp Number</p>
                <input id="auth-wa" type="number" placeholder="628xxx" class="w-full font-bold outline-none bg-transparent">
            </div>
            <div class="bg-gray-50 p-5 rounded-[25px] border border-gray-100">
                <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Password</p>
                <input id="auth-pass" type="password" placeholder="••••••" class="w-full font-bold outline-none bg-transparent">
            </div>
            <button onclick="handleAuth()" id="btn-auth" class="w-full py-5 rounded-[25px] bg-gray-900 text-white font-bold text-lg shadow-xl mt-4">MASUK</button>
            <p class="text-center text-[11px] font-bold text-gray-400 mt-6">
                <span id="auth-text">Belum punya akun?</span> 
                <button onclick="toggleAuth()" id="auth-toggle-btn" class="text-blue-600 underline">Daftar</button>
            </p>
        </div>
    </div>

    <div id="main-section" class="hidden fade-in pb-32">
        <div id="page-home" class="p-6 space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="font-extrabold text-xl italic tracking-tighter">CLOUDPAY.</h2>
                <span id="display-user" class="text-[10px] font-bold bg-white text-blue-600 px-4 py-1.5 rounded-full border border-blue-50 uppercase shadow-sm">@user</span>
            </div>
            <div class="bg-gray-900 p-8 rounded-[40px] text-white shadow-2xl relative overflow-hidden">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1 tracking-widest">Saldo Tersedia</p>
                <h3 class="text-4xl font-extrabold tracking-tight">Rp <span id="display-balance">0</span></h3>
                <div class="mt-10 flex gap-3">
                    <button onclick="switchTab('qris')" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold text-sm">Top Up</button>
                    <button onclick="switchTab('wd')" class="flex-1 bg-white/10 py-4 rounded-2xl font-bold text-sm backdrop-blur-md">Withdraw</button>
                </div>
            </div>
        </div>

        <div id="page-wd" class="hidden p-6 fade-in">
            <h2 class="text-2xl font-extrabold mb-2 text-red-600 italic uppercase">Withdraw</h2>
            <p class="text-[9px] text-gray-400 mb-6 font-bold uppercase tracking-widest">ESTIMASI PENCAIRAN MAKSIMAL 120 JAM</p>
            <div class="space-y-4">
                <div class="bg-white p-6 rounded-[30px] border border-gray-50 shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">E-Wallet</p>
                    <select id="wd-wallet" class="w-full font-bold outline-none bg-transparent">
                        <option value="DANA">DANA</option>
                        <option value="GOPAY">GOPAY</option>
                    </select>
                </div>
                <div class="bg-white p-6 rounded-[30px] border border-gray-50 shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Nomor Rekening/E-Wallet</p>
                    <input id="wd-target" type="number" placeholder="08xxxxx" class="w-full font-bold outline-none bg-transparent">
                </div>
                <div class="bg-white p-6 rounded-[30px] border border-gray-50 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Nominal</p>
                    <input id="wd-amt" type="number" placeholder="Min. 10.000" class="w-full text-2xl font-black outline-none text-red-600 bg-transparent text-center">
                </div>
                <button onclick="handleWD()" id="btn-wd" class="w-full py-5 rounded-[25px] bg-gray-900 text-white font-bold text-lg shadow-2xl">PROSES PENARIKAN</button>
            </div>
        </div>

        <div id="page-qris" class="hidden p-6 fade-in text-center">
            <div id="qris-form" class="text-left space-y-4">
                <h2 class="text-2xl font-extrabold italic uppercase">Top Up</h2>
                <div class="bg-white p-7 rounded-[35px] border border-gray-50 shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Nominal Deposit</p>
                    <input id="topup-amt" type="number" value="1000" class="w-full text-3xl font-extrabold outline-none text-blue-600 bg-transparent">
                </div>
                <button onclick="generateQR()" id="btn-gen" class="btn-grad w-full py-5 rounded-[25px] text-white font-bold text-lg shadow-xl">GENERATE QRIS</button>
            </div>
            <div id="qr-display" class="hidden fade-in">
                <canvas id="qris-canvas" width="400" height="550" class="mx-auto mb-6"></canvas>
                <button onclick="cancelQR()" class="text-red-500 font-bold text-xs uppercase underline">Batalkan Transaksi</button>
            </div>
        </div>

        <div id="nav-bar" class="fixed bottom-6 left-6 right-6 h-20 liquid-nav flex items-center justify-around px-2">
            <button onclick="switchTab('home')" id="nav-home" class="nav-active flex flex-col items-center">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>
            </button>
            <button onclick="switchTab('qris')" id="nav-qris" class="text-gray-400 flex flex-col items-center">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <button onclick="switchTab('wd')" id="nav-wd" class="text-gray-400 flex flex-col items-center">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 9l-5 5-5-5"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    let isRegister = false;
    let currentUser = null;
    let paymentChecker = null;

    function toggleAuth() {
        isRegister = !isRegister;
        document.getElementById('reg-fields').classList.toggle('hidden');
        document.getElementById('btn-auth').innerText = isRegister ? "DAFTAR SEKARANG" : "MASUK";
        document.getElementById('auth-text').innerText = isRegister ? "Sudah punya akun?" : "Belum punya akun?";
        document.getElementById('auth-toggle-btn').innerText = isRegister ? "Login" : "Daftar";
    }

    async function handleAuth() {
        const wa = document.getElementById('auth-wa').value;
        const pass = document.getElementById('auth-pass').value;
        const name = document.getElementById('auth-name').value;
        if(!wa || !pass || (isRegister && !name)) return alert("Isi data lengkap!");

        const btn = document.getElementById('btn-auth');
        btn.disabled = true; btn.innerText = "Wait...";

        try {
            const endpoint = isRegister ? '/api/register' : '/api/login';
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ wa, pass, name })
            });
            const data = await res.json();

            if(data.success) {
                currentUser = data.user;
                document.getElementById('display-user').innerText = currentUser.name;
                document.getElementById('page-auth').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                refreshBalance();
            } else alert(data.msg);
        } catch(e) { alert("Error Server!"); }
        btn.disabled = false; btn.innerText = isRegister ? "DAFTAR" : "MASUK";
    }

    async function refreshBalance() {
        try {
            const res = await fetch(`/api/user-data?wa=${currentUser.wa}`);
            const data = await res.json();
            document.getElementById('display-balance').innerText = (data.balance || 0).toLocaleString('id-ID');
        } catch(e) {}
    }

    window.switchTab = (tab) => {
        ['home', 'qris', 'wd'].forEach(p => document.getElementById('page-' + p).classList.add('hidden'));
        document.getElementById('page-' + tab).classList.remove('hidden');
        ['home', 'qris', 'wd'].forEach(n => {
            const el = document.getElementById('nav-' + n);
            if(el) { el.classList.remove('nav-active', 'text-gray-400'); el.classList.add(n === tab ? 'nav-active' : 'text-gray-400'); }
        });
    }

    window.generateQR = async () => {
        const amt = document.getElementById('topup-amt').value;
        const btn = document.getElementById('btn-gen');
        btn.disabled = true; btn.innerText = "Connecting...";

        try {
            const res = await fetch(`/api/gen-qr?amt=${amt}`);
            const data = await res.json();
            if(data.success) {
                document.getElementById('qris-form').classList.add('hidden');
                document.getElementById('qr-display').classList.remove('hidden');
                drawQRIS(data.qr, amt);
                
                paymentChecker = setInterval(async () => {
                    const c = await fetch(`/api/check-payment?trxId=${data.trxId}&wa=${currentUser.wa}&amt=${amt}&uname=${currentUser.name}`);
                    const cd = await c.json();
                    if(cd.status === "Success") {
                        clearInterval(paymentChecker);
                        alert("✅ TOPUP SUCCESS!"); 
                        location.reload();
                    }
                }, 5000);
            }
        } catch(e) { alert("Gagal!"); btn.disabled = false; btn.innerText = "GENERATE QRIS"; }
    };

    window.handleWD = async () => {
        const amt = parseInt(document.getElementById('wd-amt').value);
        const target = document.getElementById('wd-target').value;
        const wallet = document.getElementById('wd-wallet').value;
        if(!target || amt < 10000) return alert("Cek kembali nomor dan nominal (Min 10k)!");

        try {
            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ wa: currentUser.wa, uname: currentUser.name, amt: amt, wallet: wallet, targetNumber: target })
            });
            const data = await res.json();
            if(data.success) {
                alert("✅ WD Berhasil Diajukan!\nEstimasi Cair 120 Jam.");
                location.reload();
            } else alert(data.msg || "Saldo tidak cukup!");
        } catch(e) { alert("Error WD!"); }
    };

    function drawQRIS(qrString, amount) {
        const canvas = document.getElementById('qris-canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 400, 550);
        ctx.fillStyle = '#1a1a1a'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
        ctx.fillText('Lhoktogame', 200, 70);
        ctx.fillStyle = '#8E8E93'; ctx.font = 'bold 11px Arial';
        ctx.fillText('POWERED BY CLOUDPAY', 200, 95);
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(qrString)}`;
        img.onload = () => {
            ctx.drawImage(img, 75, 140, 250, 250);
            ctx.fillStyle = '#007AFF'; ctx.font = 'bold 32px Arial';
            ctx.fillText(`Rp ${parseInt(amount).toLocaleString('id-ID')}`, 200, 480);
        }
    }

    window.cancelQR = () => { clearInterval(paymentChecker); location.reload(); };
</script>
</body>
</html>
