<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloudpay Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F4F7FE; -webkit-tap-highlight-color: transparent; }
        .nav-active { color: #2962FF; font-weight: 800; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.5); }
        .btn-grad { background: linear-gradient(135deg, #2962FF 0%, #0039CB 100%); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        canvas { max-width: 100%; height: auto; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="overflow-x-hidden">

<div id="app" class="max-w-md mx-auto min-h-screen pb-32">
    
    <div id="auth-section" class="flex flex-col items-center justify-center min-h-screen p-6 fade-in">
        <div class="w-full bg-white p-8 rounded-[40px] shadow-2xl border border-gray-100 flex flex-col items-center">
            <div class="bg-[#2962FF] w-16 h-16 rounded-[22px] flex items-center justify-center mb-6 shadow-lg shadow-blue-200">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 4.02 2 6.5v11c0 2.48 4.48 4.5 10 4.5s10-2.02 10-4.5v-11C22 4.02 17.52 2 12 2z"/></svg>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-900 mb-8">Cloudpay Cloud</h1>
            <div class="w-full space-y-4">
                <input id="u_wa" type="number" placeholder="Nomor WhatsApp" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-semibold border-2 border-transparent focus:border-blue-500">
                <input id="u_pw" type="password" placeholder="Password" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-semibold border-2 border-transparent focus:border-blue-500">
                <input id="u_name" type="text" placeholder="Username (Jika baru)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-semibold border-2 border-transparent focus:border-blue-500">
                <button onclick="handleAuth()" class="btn-grad w-full py-4 rounded-2xl text-white font-bold text-lg shadow-lg">Masuk Akun</button>
            </div>
        </div>
    </div>

    <div id="main-section" class="hidden fade-in">
        
        <div id="page-home" class="p-6 space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="font-extrabold text-xl italic tracking-tighter">CLOUDPAY.</h2>
                <span id="display-user" class="text-[10px] font-bold bg-blue-100 text-blue-600 px-3 py-1 rounded-full uppercase">...</span>
            </div>

            <div class="bg-gray-900 p-7 rounded-[40px] text-white shadow-2xl relative overflow-hidden">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">Saldo Tersedia</p>
                <h3 class="text-4xl font-extrabold tracking-tight">Rp <span id="display-balance">0</span></h3>
                <div class="mt-8 flex gap-3">
                    <button onclick="switchTab('qris')" class="flex-1 bg-blue-600 py-3.5 rounded-2xl font-bold text-sm">Top Up</button>
                    <button onclick="switchTab('wd')" class="flex-1 bg-white/10 py-3.5 rounded-2xl font-bold text-sm backdrop-blur-md">Tarik Dana</button>
                </div>
                <div class="absolute -right-4 -top-4 w-32 h-32 bg-blue-500 rounded-full blur-[70px] opacity-20"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-[30px] border border-gray-100 shadow-sm text-center">
                    <p class="text-[9px] font-bold text-gray-400 uppercase">Total Top Up</p>
                    <p class="text-lg font-extrabold text-green-500">Rp <span id="stat-in">0</span></p>
                </div>
                <div class="bg-white p-5 rounded-[30px] border border-gray-100 shadow-sm text-center">
                    <p class="text-[9px] font-bold text-gray-400 uppercase">Total Withdraw</p>
                    <p class="text-lg font-extrabold text-red-500">Rp <span id="stat-out">0</span></p>
                </div>
            </div>
        </div>

        <div id="page-history" class="hidden p-6 fade-in">
            <h2 class="text-2xl font-extrabold mb-6">Riwayat Transaksi</h2>
            <div id="history-list" class="space-y-3 pb-20"></div>
        </div>

        <div id="page-qris" class="hidden p-6 fade-in text-center">
            <div id="qris-form" class="text-left space-y-4">
                <h2 class="text-2xl font-extrabold">Isi Saldo</h2>
                <div class="bg-white p-6 rounded-[35px] border border-gray-100 shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Nominal (Min. 100)</p>
                    <input id="topup-amt" type="number" value="1000" class="w-full text-3xl font-extrabold outline-none text-blue-600">
                </div>
                <button onclick="generateQR()" id="btn-gen" class="btn-grad w-full py-5 rounded-3xl text-white font-bold text-lg">Buat Kode QRIS</button>
            </div>

            <div id="qr-display" class="hidden fade-in">
                <canvas id="qris-canvas" width="400" height="550" class="mx-auto mb-6"></canvas>
                
                <div class="space-y-4">
                    <div class="flex items-center justify-center gap-3 text-blue-600 font-bold">
                        <div class="w-2 h-2 bg-blue-600 rounded-full animate-ping"></div>
                        <span class="text-sm tracking-widest uppercase">Menunggu Pembayaran</span>
                    </div>
                    <button onclick="cancelQR()" class="w-full py-4 rounded-3xl bg-red-50 text-red-600 font-extrabold border border-red-100">BATALKAN TRANSAKSI</button>
                </div>
            </div>
        </div>

        <div id="page-wd" class="hidden p-6 fade-in">
            <h2 class="text-2xl font-extrabold mb-6">Tarik Dana</h2>
            <div class="bg-white p-6 rounded-[35px] border border-gray-100 shadow-sm mb-6">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Jumlah WD (Min. 10.000)</p>
                <input id="wd-amt" type="number" placeholder="0" class="w-full text-3xl font-extrabold outline-none text-red-600">
            </div>
            <button onclick="handleWD()" class="w-full py-5 rounded-3xl bg-gray-900 text-white font-bold text-lg shadow-xl">Konfirmasi Penarikan</button>
        </div>

    </div>

    <div id="nav-bar" class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[32px] shadow-2xl z-50 hidden flex items-center justify-around px-4">
        <button onclick="switchTab('home')" id="nav-home" class="nav-active flex flex-col items-center">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>
            <span class="text-[9px] mt-1 font-bold">HOME</span>
        </button>
        <button onclick="switchTab('qris')" id="nav-qris" class="text-gray-400 flex flex-col items-center">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            <span class="text-[9px] mt-1 font-bold">TOPUP</span>
        </button>
        <button onclick="switchTab('history')" id="nav-history" class="text-gray-400 flex flex-col items-center">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="text-[9px] mt-1 font-bold">HISTORY</span>
        </button>
        <button onclick="logout()" class="text-red-400 flex flex-col items-center">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7"/></svg>
            <span class="text-[9px] mt-1 font-bold">EXIT</span>
        </button>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD1OHn2utYY881b504XEgMAwmhrglqtinQ",
        authDomain: "sedabase.firebaseapp.com",
        databaseURL: "https://sedabase-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sedabase",
        storageBucket: "sedabase.firebasestorage.app",
        messagingSenderId: "921144451877",
        appId: "1:921144451877:web:f37ec5e4de4ff4fc4870cc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const API_KEY = "rapay_jur337mgb";
    const BASE_API = "https://bior-beta.vercel.app/api/pay";

    let currentUserWA = null;
    let paymentChecker = null;

    window.switchTab = (tab) => {
        ['home', 'qris', 'history', 'wd'].forEach(p => document.getElementById('page-' + p).classList.add('hidden'));
        document.getElementById('page-' + tab).classList.remove('hidden');
        ['home', 'qris', 'history'].forEach(n => {
            const el = document.getElementById('nav-' + n);
            if(el) {
                el.classList.remove('nav-active', 'text-gray-400');
                el.classList.add(n === tab ? 'nav-active' : 'text-gray-400');
            }
        });
    }

    // --- AUTH LOGIC ---
    window.handleAuth = async () => {
        const wa = document.getElementById('u_wa').value.trim();
        const pw = document.getElementById('u_pw').value;
        const uname = document.getElementById('u_name').value.trim();
        if(!wa || !pw) return alert("Lengkapi data!");

        const userRef = ref(db, 'users/' + wa);
        const snap = await get(userRef);

        if(snap.exists()){
            if(snap.val().password === pw) loginOk(wa, snap.val().username);
            else alert("Password salah!");
        } else {
            if(!uname) return alert("Isi username untuk daftar!");
            await set(userRef, { username: uname, password: pw, wa: wa, balance: 0, total_in: 0, total_out: 0 });
            loginOk(wa, uname);
        }
    }

    function loginOk(wa, uname) {
        currentUserWA = wa;
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        document.getElementById('nav-bar').classList.remove('hidden');
        document.getElementById('display-user').innerText = uname;

        onValue(ref(db, `users/${wa}`), (snap) => {
            const d = snap.val();
            document.getElementById('display-balance').innerText = (d.balance || 0).toLocaleString('id-ID');
            document.getElementById('stat-in').innerText = (d.total_in || 0).toLocaleString('id-ID');
            document.getElementById('stat-out').innerText = (d.total_out || 0).toLocaleString('id-ID');
        });

        onValue(ref(db, `users/${wa}/riwayat`), (snap) => {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            if(!snap.exists()) return list.innerHTML = '<p class="text-center text-gray-400 py-10 italic">Kosong...</p>';
            Object.values(snap.val()).reverse().forEach(t => {
                const isIn = t.type === 'TOPUP';
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-[25px] flex justify-between items-center border border-gray-50 shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 ${isIn ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'} rounded-full flex items-center justify-center font-bold">${isIn ? '↓' : '↑'}</div>
                            <div><p class="text-xs font-black">${t.type}</p><p class="text-[9px] text-gray-400">${new Date(t.time).toLocaleString()}</p></div>
                        </div>
                        <p class="font-black ${isIn ? 'text-green-500' : 'text-red-500'}">${isIn ? '+' : '-'} ${t.amt.toLocaleString()}</p>
                    </div>`;
            });
        });
    }

    // --- CANVAS QRIS RENDERER ---
    function drawQRIS(qrString, amount) {
        const canvas = document.getElementById('qris-canvas');
        const ctx = canvas.getContext('2d');
        
        // 1. Background Batik Pattern (Mockup batik jawa warna warni)
        ctx.fillStyle = '#fdfdfd';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Header Batik Border
        for(let i=0; i<canvas.width; i+=40) {
            ctx.fillStyle = i % 80 === 0 ? '#2962FF' : '#FF3D00';
            ctx.beginPath();
            ctx.arc(i+20, 20, 15, 0, Math.PI*2);
            ctx.fill();
        }

        // 2. Text Cloudpay
        ctx.fillStyle = '#1a1a1a';
        ctx.font = 'bold 28px Plus Jakarta Sans';
        ctx.textAlign = 'center';
        ctx.fillText('CLOUDPAY QRIS', canvas.width/2, 80);
        
        ctx.font = 'bold 14px Plus Jakarta Sans';
        ctx.fillStyle = '#888';
        ctx.fillText('ALL PAYMENT - OTOMATIS TERKONFIRMASI', canvas.width/2, 105);

        // 3. QR Code Box
        ctx.strokeStyle = '#eee';
        ctx.lineWidth = 2;
        ctx.strokeRect(50, 140, 300, 300);

        // Load QR Image dari API ke Canvas
        const qrImg = new Image();
        qrImg.crossOrigin = "anonymous";
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(qrString)}`;
        qrImg.onload = () => {
            ctx.drawImage(qrImg, 75, 165, 250, 250);
            
            // 4. Footer Info
            ctx.fillStyle = '#2962FF';
            ctx.font = '800 24px Plus Jakarta Sans';
            ctx.fillText(`Rp ${parseInt(amount).toLocaleString('id-ID')}`, canvas.width/2, 490);
            
            ctx.fillStyle = '#555';
            ctx.font = 'bold 10px Plus Jakarta Sans';
            ctx.fillText('SCAN MENGGUNAKAN DANA, OVO, GOPAY, LINKAJA, ATAU MBANKING', canvas.width/2, 520);
        };
    }

    window.generateQR = async () => {
        const amt = document.getElementById('topup-amt').value;
        if(amt < 100) return alert("Min. 100");
        const btn = document.getElementById('btn-gen');
        btn.disabled = true; btn.innerText = "Membuat QRIS...";

        try {
            const res = await fetch(`${BASE_API}?key=${API_KEY}&amt=${amt}`);
            const data = await res.json();
            if(data.success) {
                document.getElementById('qris-form').classList.add('hidden');
                document.getElementById('qr-display').classList.remove('hidden');
                
                // Panggil Renderer Canvas
                drawQRIS(data.qr, amt);

                paymentChecker = setInterval(async () => {
                    const c = await fetch(`${BASE_API}?action=check&trxId=${data.trxId}`);
                    const cd = await c.json();
                    if(cd.paid) {
                        clearInterval(paymentChecker);
                        const userRef = ref(db, `users/${currentUserWA}`);
                        const s = await get(userRef);
                        const cur = s.val();
                        await update(userRef, { balance: cur.balance + parseInt(amt), total_in: (cur.total_in || 0) + parseInt(amt) });
                        push(ref(db, `users/${currentUserWA}/riwayat`), { type: 'TOPUP', amt: parseInt(amt), time: Date.now() });
                        alert("TOPUP BERHASIL!");
                        cancelQR(); switchTab('home');
                    }
                }, 5000);
            }
        } catch(e) { alert("Error API"); btn.disabled = false; }
    }

    window.cancelQR = () => {
        clearInterval(paymentChecker);
        document.getElementById('qris-form').classList.remove('hidden');
        document.getElementById('qr-display').classList.add('hidden');
        document.getElementById('btn-gen').disabled = false;
        document.getElementById('btn-gen').innerText = "Buat Kode QRIS";
    }

    window.handleWD = async () => {
        const amt = parseInt(document.getElementById('wd-amt').value);
        if(amt < 10000) return alert("Min 10rb");
        const userRef = ref(db, `users/${currentUserWA}`);
        const s = await get(userRef);
        const d = s.val();
        if(d.balance < amt) return alert("Saldo kurang");
        await update(userRef, { balance: d.balance - amt, total_out: (d.total_out || 0) + amt });
        push(ref(db, `users/${currentUserWA}/riwayat`), { type: 'WITHDRAW', amt: amt, time: Date.now() });
        alert("WD Berhasil diajukan!");
        switchTab('home');
    }

    window.logout = () => location.reload();
</script>

</body>
</html>
