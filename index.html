<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudpay - PPOB Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Neo-Brutalism Design */
        body { background-color: #00E5FF; font-family: 'Courier New', Courier, monospace; }
        .brutal-card {
            background: white;
            border: 4px solid black;
            box-shadow: 10px 10px 0px black;
        }
        .brutal-input {
            border: 3px solid black;
            padding: 10px;
            width: 100%;
            outline: none;
            font-weight: bold;
        }
        .brutal-btn {
            background: #FF3D00;
            color: white;
            border: 3px solid black;
            padding: 12px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px black;
            cursor: pointer;
        }
        .brutal-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px black;
        }
        .loading-dots:after { content: '...'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } }
    </style>
</head>
<body class="p-6">

    <div id="app" class="max-w-md mx-auto">
        <h1 class="text-5xl font-black mb-8 text-center bg-white border-4 border-black p-2 shadow-[8px_8px_0px_black]">CLOUDPAY.</h1>

        <div id="auth-section" class="brutal-card p-6">
            <h2 class="text-2xl font-black mb-4 uppercase">Login / Register</h2>
            <div class="space-y-4">
                <input id="u_name" type="text" placeholder="USERNAME" class="brutal-input">
                <input id="u_pw" type="password" placeholder="PASSWORD" class="brutal-input">
                <input id="u_wa" type="number" placeholder="NOMOR WHATSAPP (62...)" class="brutal-input">
                <button onclick="handleAuth()" class="brutal-btn w-full bg-yellow-400 !text-black">MASUK SEKARANG</button>
            </div>
        </div>

        <div id="main-section" class="hidden space-y-6">
            <div class="brutal-card p-4 bg-white flex justify-between items-center">
                <div>
                    <p class="text-sm">USER: <span id="display-user" class="font-black"></span></p>
                    <p class="text-3xl font-black text-green-600">Rp <span id="display-balance">0</span></p>
                </div>
                <button onclick="logout()" class="text-xs bg-black text-white p-1">LOGOUT</button>
            </div>

            <div class="brutal-card p-6 bg-pink-300">
                <h3 class="text-xl font-black mb-2">TOP UP SALDO</h3>
                <p class="text-xs mb-3">Min. Top Up 100 | QRIS All Payment</p>
                <input id="topup-amt" type="number" value="100" class="brutal-input mb-4">
                <button id="btn-topup" onclick="generateQR()" class="brutal-btn w-full bg-blue-500">GENERATE QRIS</button>
                
                <div id="qr-container" class="mt-6 hidden text-center bg-white border-4 border-black p-4">
                    <p class="text-sm font-black mb-2">SCAN UNTUK BAYAR</p>
                    <img id="qr-img" src="" alt="QRIS" class="mx-auto border-2 border-black mb-2">
                    <p id="status-text" class="text-xs font-bold text-red-600 loading-dots">MENUNGGU PEMBAYARAN</p>
                </div>
            </div>

            <div class="brutal-card p-6 bg-green-200">
                <h3 class="text-xl font-black mb-2">WITHDRAW</h3>
                <p class="text-[10px] mb-3">Min. 10.000 | Admin: 1.000</p>
                <input id="wd-amt" type="number" placeholder="JUMLAH TARIK" class="brutal-input mb-4">
                <button onclick="handleWD()" class="brutal-btn w-full bg-black text-white">TARIK SALDO</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase dari CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi Database Sesuai Prompt
        const firebaseConfig = {
            apiKey: "AIzaSyD1OHn2utYY881b504XEgMAwmhrglqtinQ",
            authDomain: "sedabase.firebaseapp.com",
            databaseURL: "https://sedabase-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sedabase",
            storageBucket: "sedabase.firebasestorage.app",
            messagingSenderId: "921144451877",
            appId: "1:921144451877:web:f37ec5e4de4ff4fc4870cc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const API_KEY = "rapay_jur337mgb";
        const BASE_API = "https://bior-beta.vercel.app/api/pay";

        let currentUser = null;

        // AUTH HANDLER
        window.handleAuth = async () => {
            const user = document.getElementById('u_name').value.trim();
            const pw = document.getElementById('u_pw').value;
            const wa = document.getElementById('u_wa').value;

            if(!user || !pw) return alert("Username & Password wajib diisi!");

            const userRef = ref(db, 'users/' + user);
            const snapshot = await get(userRef);

            if (snapshot.exists()) {
                if(snapshot.val().password === pw) {
                    initApp(user);
                } else {
                    alert("Password Salah!");
                }
            } else {
                if(!wa) return alert("Daftar baru wajib isi nomor WA!");
                await set(userRef, { username: user, password: pw, wa: wa, balance: 0 });
                initApp(user);
            }
        };

        function initApp(user) {
            currentUser = user;
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('display-user').innerText = user;
            
            // Sync Saldo Realtime
            onValue(ref(db, `users/${user}/balance`), (snap) => {
                document.getElementById('display-balance').innerText = (snap.val() || 0).toLocaleString('id-ID');
            });
        }

        // TOPUP QRIS
        window.generateQR = async () => {
            const amt = parseInt(document.getElementById('topup-amt').value);
            const btn = document.getElementById('btn-topup');
            
            if(amt < 100) return alert("Minimal Top Up Rp 100!");

            btn.disabled = true;
            btn.innerText = "GENERATING...";

            try {
                const res = await fetch(`${BASE_API}?key=${API_KEY}&amt=${amt}`);
                const data = await res.json();

                if(data.success) {
                    document.getElementById('qr-container').classList.remove('hidden');
                    // Menggunakan QR Server untuk render string QRIS dari API
                    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.qr)}`;
                    
                    // Simpan data transaksi sementara ke DB
                    await set(ref(db, 'transactions/' + data.trxId), {
                        username: currentUser,
                        amount: amt,
                        status: 'pending',
                        timestamp: Date.now()
                    });

                    startAutoCheck(data.trxId, amt);
                }
            } catch (err) {
                alert("Gagal koneksi ke API!");
                btn.disabled = false;
                btn.innerText = "GENERATE QRIS";
            }
        };

        // CEK STATUS OTOMATIS
        function startAutoCheck(trxId, amount) {
            const checker = setInterval(async () => {
                try {
                    const res = await fetch(`${BASE_API}?action=check&trxId=${trxId}`);
                    const data = await res.json();

                    if(data.paid) {
                        clearInterval(checker);
                        
                        const userRef = ref(db, `users/${currentUser}`);
                        const snap = await get(userRef);
                        const newBalance = (snap.val().balance || 0) + amount;
                        
                        await update(userRef, { balance: newBalance });
                        await update(ref(db, `transactions/${trxId}`), { status: 'success' });
                        
                        alert("PEMBAYARAN DITERIMA! Saldo telah ditambahkan.");
                        document.getElementById('qr-container').classList.add('hidden');
                        document.getElementById('btn-topup').disabled = false;
                        document.getElementById('btn-topup').innerText = "GENERATE QRIS";
                    }
                } catch (e) { console.error("Checking error..."); }
            }, 5000); // Cek setiap 5 detik
        }

        // WITHDRAW HANDLER
        window.handleWD = async () => {
            const amt = parseInt(document.getElementById('wd-amt').value);
            if(amt < 10000) return alert("Minimal Withdraw Rp 10.000");

            const userRef = ref(db, `users/${currentUser}`);
            const snap = await get(userRef);
            const currentBal = snap.val().balance || 0;

            if(currentBal < amt) return alert("Saldo tidak cukup!");

            const potongAdmin = 1000;
            const yangDiterima = amt - potongAdmin;

            if(confirm(`Konfirmasi Withdraw Rp ${amt.toLocaleString()}?\nAdmin: 1.000\nTotal Cair: ${yangDiterima.toLocaleString()}`)) {
                await update(userRef, { balance: currentBal - amt });
                alert(`Permintaan Withdraw Berhasil! Silakan tunggu admin memproses ke nomor WA: ${snap.val().wa}`);
            }
        };

        window.logout = () => location.reload();
    </script>
</body>
</html>
